<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>404 — CoDictionary</title>
<meta name="robots" content="noindex">
<meta name="theme-color" content="#0B0913">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<style>
  :root{--void:#0B0913;--gold:#F5C24B;--violet:#B084FF;--cyan:#4FE6E6;--ink:#EDEAF6;--dim:#B7B1D0;
    --mono:"Cascadia Code","Consolas",ui-monospace,monospace;--jp:"Yu Gothic","Hiragino Kaku Gothic ProN",sans-serif;}
  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;}
  body{display:flex;align-items:center;justify-content:center;text-align:center;padding:24px;
    background:var(--void);color:var(--ink);font-family:var(--jp);
    background-image:radial-gradient(circle at 20% -10%,rgba(176,132,255,.14),transparent 42%),radial-gradient(circle at 90% 0%,rgba(79,230,230,.10),transparent 42%);}
  .code{font-family:var(--mono);font-size:clamp(64px,18vw,140px);font-weight:800;line-height:1;
    color:var(--gold);text-shadow:0 0 24px rgba(245,194,74,.5);margin:0;}
  .code b{color:var(--violet);}
  h1{font-size:clamp(18px,4vw,24px);margin:18px 0 6px;color:#fff;}
  p{color:var(--dim);font-size:15px;margin:0 0 24px;line-height:1.9;}
  .home{display:inline-block;font-family:var(--mono);font-size:14px;font-weight:800;text-decoration:none;
    color:var(--void);background:linear-gradient(90deg,var(--cyan),#8ff);border:1px solid var(--cyan);
    border-radius:10px;padding:12px 24px;box-shadow:0 0 18px rgba(79,230,230,.4);transition:.15s;}
  .home:hover{filter:brightness(1.08);box-shadow:0 0 28px rgba(79,230,230,.6);}
  .en{display:block;color:#8A85AE;font-size:13px;margin-top:14px;}
</style>
</head>
<body>
  <main>
    <p class="code">4<b>0</b>4</p>
    <h1>ページが見つかりません</h1>
    <p>お探しのページは移動または削除された可能性があります。<span class="en" lang="en">The page you are looking for was moved or does not exist.</span></p>
    <a class="home" href="/codictionary/">▶ 辞書へ戻る / <span lang="en">Back to the dictionary</span></a>
  </main>
</body>
</html>
